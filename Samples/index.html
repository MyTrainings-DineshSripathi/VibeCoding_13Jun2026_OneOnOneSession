<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | Apex</title>
    <style>
        /* ------------------------------------ */
        /* Design System & Reset                */
        /* ------------------------------------ */
        :root {
            /* Apple-inspired Premium Palette */
            --bg-primary: #000000;
            --bg-surface: #1c1c1e;
            --bg-input: #2c2c2e;
            
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-error: #ff453a;
            
            --accent: #007aff;
            --accent-gradient: linear-gradient(135deg, #007aff, #0a84ff);
            
            --border-radius-interactive: 12px;
            --border-radius-surface: 24px;
            
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            overflow-x: hidden;
        }

        /* ------------------------------------ */
        /* Layout & Containers                  */
        /* ------------------------------------ */
        header {
            width: 100%;
            text-align: center;
            padding-top: 40px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--text-primary);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .brand-logo svg {
            width: 24px;
            height: 24px;
            fill: var(--bg-primary);
        }

        main {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-container {
            background-color: var(--bg-surface);
            padding: 32px 24px;
            border-radius: var(--border-radius-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            margin-bottom: 28px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* ------------------------------------ */
        /* Form Controls                        */
        /* ------------------------------------ */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            height: 50px;
            background-color: var(--bg-input);
            border: 1px solid transparent;
            border-radius: var(--border-radius-interactive);
            padding: 0 16px;
            color: var(--text-primary);
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
            transition: var(--transition-smooth);
            outline: none;
        }

        /* Apple SF Style Interaction states */
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        /* Error States */
        .form-group.has-error .form-input {
            border-color: var(--text-error);
        }
        
        .error-message {
            display: none;
            color: var(--text-error);
            font-size: 12px;
            margin-top: 6px;
            font-weight: 500;
        }
        
        .form-group.has-error .error-message {
            display: block;
        }

        /* Form Utilities */
        .form-utils {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -4px;
            margin-bottom: 24px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .remember-me input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .custom-checkbox {
            height: 20px;
            width: 20px;
            background-color: var(--bg-input);
            border-radius: 6px;
            margin-right: 10px;
            position: relative;
            transition: var(--transition-smooth);
        }

        .remember-me input:checked ~ .custom-checkbox {
            background-color: var(--accent);
        }

        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 7px;
            top: 3px;
            width: 4px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .remember-me input:checked ~ .custom-checkbox::after {
            display: block;
        }

        .forgot-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .forgot-link:hover {
            opacity: 0.8;
        }

        /* ------------------------------------ */
        /* Buttons                              */
        /* ------------------------------------ */
        .btn-submit {
            width: 100%;
            height: 50px;
            background: var(--accent);
            border: none;
            border-radius: var(--border-radius-interactive);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* ------------------------------------ */
        /* Footer                               */
        /* ------------------------------------ */
        footer {
            width: 100%;
            text-align: center;
            padding: 24px 0 12px 0;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .footer-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
        }

        /* ------------------------------------ */
        /* Responsive Breakpoints (Desktop)     */
        /* ------------------------------------ */
        @media (min-width: 768px) {
            body {
                background-color: #000000;
                justify-content: center;
                gap: 40px;
            }
            header {
                padding-top: 0;
            }
            main {
                flex-grow: 0;
            }
            .auth-container {
                width: 400px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 22h20L12 2zm0 4.18L18.82 19H5.18L12 6.18z"/>
            </svg>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h1>Sign in to Apex</h1>
                <p>Enter your credentials to access your account</p>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group" id="emailGroup">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="name@company.com"
                            autocomplete="username"
                            required
                        >
                    </div>
                    <span class="error-message" id="emailError">Please enter a valid email address</span>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                    </div>
                    <span class="error-message" id="passwordError">Password is required</span>
                </div>

                <div class="form-utils">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span class="custom-checkbox"></span>
                        Keep me signed in
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Continue</button>
            </form>
        </div>
    </main>

    <footer>
        <p class="footer-text">Don't have an account? <a href="#" class="footer-link">Get started</a></p>
    </footer>

    <script>
        // Simple front-end validation wireframe to demonstrate error state architecture
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailGroup = document.getElementById('emailGroup');
            const passwordGroup = document.getElementById('passwordGroup');
            
            let isValid = true;

            // Reset states
            emailGroup.classList.remove('has-error');
            passwordGroup.classList.remove('has-error');

            // Email validation
            if (!emailInput.value || !emailInput.value.includes('@')) {
                emailGroup.classList.add('has-error');
                isValid = false;
            }

            // Password validation
            if (!passwordInput.value.trim()) {
                passwordGroup.classList.add('has-error');
                isValid = false;
            }

            if (isValid) {
                alert('Secure payload structure ready for transport layer encryption.');
            }
        });
    </script>
</body>
</html>
